<svg xmlns="http://www.w3.org/2000/svg" width="350" height="195" viewBox="0 0 350 195">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@700&amp;family=Orbitron:wght@700&amp;family=Share+Tech+Mono&amp;display=swap');
      .box-bg {
        fill: #04060A;
        stroke: #C2BEB0;
        stroke-opacity: 0.15;
        stroke-width: 1px;
        rx: 6px;
      }
      .title-text {
        font-family: 'Orbitron', sans-serif;
        font-size: 10px;
        font-weight: 700;
        fill: #C2BEB0;
        letter-spacing: 0.15em;
      }
      .subtitle-text {
        font-family: 'Share Tech Mono', monospace;
        font-size: 9px;
        fill: #928D7C;
      }
      .divider {
        stroke: #C2BEB0;
        stroke-opacity: 0.1;
        stroke-width: 1px;
      }
      .giant-number {
        font-family: 'Chakra Petch', sans-serif;
        font-size: 32px;
        font-weight: 700;
        fill: #E0DCC8;
      }
      .giant-label {
        font-family: 'Orbitron', sans-serif;
        font-size: 7px;
        fill: #928D7C;
        letter-spacing: 0.1em;
      }
      .stat-val {
        font-family: 'Chakra Petch', sans-serif;
        font-size: 15px;
        font-weight: 700;
        fill: #E0DCC8;
      }
      .stat-lbl {
        font-family: 'Orbitron', sans-serif;
        font-size: 7px;
        fill: #928D7C;
        letter-spacing: 0.05em;
      }
      .status-text {
        font-family: 'Share Tech Mono', monospace;
        font-size: 8px;
        fill: #C2BEB0;
      }
      @keyframes blink {
        0%, 100% { opacity: 0.3; }
        50% { opacity: 1; }
      }
      .blinker {
        animation: blink 2s infinite;
        fill: #34D399;
      }
    </style>
  </defs>

  <!-- Background Card -->
  <rect x="0.5" y="0.5" width="349" height="194" class="box-bg" />

  <!-- Top Header -->
  <text x="15" y="22" class="title-text">GUNATEJA777 / TRAFFIC</text>
  <text x="335" y="22" text-anchor="end" class="subtitle-text">Views - HiloO</text>
  <line x1="15" y1="30" x2="335" y2="30" class="divider" />

  <!-- Main Views Column -->
  <g transform="translate(15, 45)">
    <!-- Views Count -->
    <text x="0" y="32" class="giant-number">6</text>
    <text x="0" y="44" class="giant-label">TOTAL PROFILE VIEWS</text>
  </g>

  <!-- Divider between views and stats -->
  <line x1="155" y1="45" x2="155" y2="105" class="divider" />

  <!-- Secondary Stats Column -->
  <g transform="translate(170, 45)">
    <!-- Followers -->
